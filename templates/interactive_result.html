{% extends "base.html" %}

{% block content %}
<div class="result-container">
    <h2>Analysis Results 🌾</h2>
    
    <div class="image-preview">
        <img src="{{ image }}" alt="Analyzed Crop" class="uploaded-image">
        <p class="file-info">Uploaded: {{ original_filename }}</p>
    </div>

    <div class="analysis-output markdown-body">
        {{ html_output | safe }}
    </div>

    <div class="action-buttons">
        <a href="/detect" class="btn retry-btn">🔄 Analyze Another</a>
        <button class="btn share-btn" onclick="navigator.clipboard.writeText(window.location.href)">
            📋 Share Results
        </button>
    </div>
</div>
{% endblock %}
